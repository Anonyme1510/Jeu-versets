<!DOCTYPE html><html lang="fr"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Jeu de Versets</title><style>

body {
    margin: 0;
    min-height: 100vh;
    font-family: Arial, sans-serif;
    background: linear-gradient(rgba(0,0,0,0.45), rgba(0,0,0,0.45)),

}

.conteneur {

    text-align: center;

}

button {
    background: white;
    color: #333;
    border: none;
    padding: 15px 25px;
    margin: 10px;
    border-radius: 12px;
    font-size: 16px;
    cursor: pointer;
}

button:hover {
    transform: scale(1.05);
}

h1 {

}

#question, #reponse {
    margin-top: 25px;
    font-size: 24px;
}
</style>
</head>
<body>

</button>

<button onclick="choisirMode('verset')">
✏️ Verset → Référence
</button>

<button onclick="choisirMode('aleatoire')">
🎲 Aléatoire
</button>
</div>

<div id="jeu" style="display:none;">

<button id="btnSuivant" onclick="afficherVerset()"></button>

<button id="btnAfficher" onclick="afficherContenu()"></button>

{reference:"Jean 2:19", contenu:"Jésus leur répondit: Détruisez ce temple, et en trois jours je le relèverai."},
{reference:"1 Corinthiens 3:16-17", contenu:"Ne savez-vous pas que vous êtes le temple de Dieu, et que l'Esprit de Dieu habite en vous?Si quelqu'un détruit le temple de Dieu, Dieu le détruira; car le temple de Dieu est saint, et c'est ce que vous êtes."},
{reference:"Proverbes 1:7", contenu:"La crainte de l'Éternel est le commencement de la science; Les insensés méprisent la sagesse et l'instruction."},
{reference:"Romains 10:17", contenu:" Ainsi la foi vient de ce qu'on entend, et ce quon entend vient de la parole de Christ."},
{reference:"Jacques 2:26", contenu:"Comme le corps sans âme est mort, de même la foi sans les oeuvres est morte."},
{reference:"Matthieu 7:24", contenu:"La pluie est tombée, les torrents sont venus, les vents ont soufflé et se sont jetés contre cette maison : elle n'est point tombée parce qu'elle était fondée sur le roc."},
{reference:"1 Corinthiens 3:9", contenu:" Nous sommes ouvriers avec Dieu, vous êtes le champs de Dieu, l'édifice de Dieu."},
{reference:"1 Pierre 5:8", contenu:" Soyez sobres, veillez. Votre adversaire le diable rôde commeun lyon rugissant, cherchant qu'il dévorera."},
{reference:"Matthieu 17:11", contenu:""},
{reference:"Jean 3:5-6", contenu:"Jésus répondit: En vérité, en vérité, je te le dis, si un homme ne naît d'eau et d'Esprit, il ne peut entrer dans le royaume de Dieu.Ce qui est né de la chair est chair, et ce qui est né de l'Esprit est Esprit."},
{reference:"Matthieu 6:31-33", contenu:"Ne vous inquiétez donc point, et ne dites pas: Que mangerons-nous? que boirons-nous? de quoi serons-nous vêtus?Car toutes ces choses, ce sont les païens qui les recherchent. Votre Père céleste sait que vous en avez besoin.Cherchez premièrement le royaume et la justice de Dieu; et toutes ces choses vous seront données par-dessus."},
{reference:"Job 34:3-4", contenu:"Car l'oreille discerne les paroles, Comme le palais savoure les aliments.Choisissons ce qui est juste, Voyons entre nous ce qui est bon."},

{reference:"Luc 8:11", contenu:"Voici ce que signifie cette parabole: La semence, c'est la parole de Dieu."},

{reference:"Jean 17:3", contenu:"Or, la vie éternelle, c'est qu'ils te connaissent, toi, le seul vrai Dieu, et celui que tu as envoyé, Jésus Christ."},
{reference:"2 Jean 1:11", contenu:"Jésus lui répondit: Si quelqu'un m'aime, il gardera ma parole, et mon Père l'aimera; nous viendrons à lui, et nous ferons notre demeure chez lui."},
{reference:"Matthieu 19:16-19", contenu:"Et voici, un homme s'approcha, et dit à Jésus: Maître, que dois-je faire de bon pour avoir la vie éternelle?Il lui répondit: Pourquoi m'interroges-tu sur ce qui est bon? Un seul est le bon. Si tu veux entrer dans la vie, observe les commandements. Lesquels? lui dit-il.Et Jésus répondit: Tu ne tueras point; tu ne commettras point d'adultère; tu ne déroberas point; tu ne diras point de faux témoignage; honore ton père et ta mère;et: tu aimeras ton prochain comme toi-même"},
{reference:"Jérémie 2:13", contenu:"Car mon peuple a commis un double péché: Ils m'ont abandonné, moi qui suis une source d'eau vive, Pour se creuser des citernes, des citernes crevassées, Qui ne retiennent pas l'eau."},
{reference:"Deutéronome 32:2", contenu:"Que mes instructions se répandent comme la pluie, Que ma parole tombe comme la rosée, Comme des ondées sur la verdure, Comme des gouttes d'eau sur l'herbe!"},
{reference:"Jude 1:6", contenu:"qu'il a réservé pour le jugement du grand jour, enchaînés éternellement par les ténèbres, les anges qui n'ont pas gardé leur dignité, mais qui ont abandonné leur propre demeure;"},
{reference:"Hébreux 1:14", contenu:"Ne sont-ils pas tous des esprits au service de Dieu, envoyés pour exercer un ministère en faveur de ceux qui doivent hériter du salut?"},
{reference:"Colossiens 1:16", contenu:""},
{reference:"Zacharie 12:1", contenu:""},
{reference:"Exode 3:14", contenu:""},
{reference:"Psaume 84:12", contenu:""},
{reference:"Jean 4:24", contenu:""},
{reference:"Exode 14:12-15", contenu:""},
{reference:"Genèse 3:1", contenu:""},
{reference:"Apocalypse 20:1", contenu:""},
{reference:"Apocalypse 20:2", contenu:""},
{reference:"Apocalypse 12:7-9", contenu:""},
{reference:"Apocalypse 1:20", contenu:""},
{reference:"1 Corinthiens 15:3-4", contenu:"e vous ai enseigné avant tout, comme je l'avais aussi reçu, que Christ est mort pour nos péchés, selon les Écritures;qu'il a été enseveli, et qu'il est ressuscité le troisième jour, selon les Écritures;"},
{reference:"Actes 26:17", contenu:""},
{reference:"Jean 15:16", contenu:""},
{reference:"2 Corinthiens 4:16", contenu:""},
{reference:"Matthieu 7:21", contenu:""},
{reference:"Matthieu 7:24", contenu:""}
];

let versetActuel = null;

let mode = "reference";

    modeJeu = mode;

function choisirMode(m){

    mode = m;

    document.getElementById("menu").style.display = "none";
    document.getElementById("jeu").style.display = "block";

    afficherVerset();

}

function afficherVerset() {

    versetActuel = versets[Math.floor(Math.random() * versets.length)];

    document.getElementById("reponse").innerText = "";

    if(mode=="reference"){

        document.getElementById("question").innerText =
        versetActuel.reference;

        document.getElementById("btnAfficher").innerText =
        "Afficher le contenu";

        document.getElementById("btnSuivant").innerText =
        "Verset suivant";

    }

    else if(mode=="verset"){

        document.getElementById("question").innerText =
        versetActuel.contenu;

        document.getElementById("btnAfficher").innerText =
        "Afficher la référence";

        document.getElementById("btnSuivant").innerText =
        "Contenu suivant";

    }

    else{

        if(Math.random()<0.5){

            document.getElementById("question").innerText =
            versetActuel.reference;

            document.getElementById("btnAfficher").innerText =
            "Afficher le contenu";

        }
        else{

            document.getElementById("question").innerText =
            versetActuel.contenu;

            document.getElementById("btnAfficher").innerText =
            "Afficher la référence";

        }

        document.getElementById("btnSuivant").innerText =
        "Suivant";

    }
}
    

function afficherContenu(){

    if(!versetActuel) return;

    if(document.getElementById("btnAfficher").innerText=="Afficher le contenu"){

        document.getElementById("reponse").innerText =
        versetActuel.contenu;

    }
    else{

        document.getElementById("reponse").innerText =
        versetActuel.reference;

    }

}


function retourMenu(){

    document.getElementById("jeu").style.display = "none";
    document.getElementById("menu").style.display = "block";

    document.getElementById("question").innerText = "";
    document.getElementById("reponse").innerText = "";

}

</script>
</div>
</body></html>
