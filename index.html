<!DOCTYPE html><html lang="fr"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Jeu de Versets</title></head>
<body>
<h1>Jeu de Versets Bibliques</h1>
<button onclick="afficherVerset()">Verset suivant</button>
<p id="question"></p>
<script>
const references = ["Jean 1:1-4","Exode 25:8-9","Jean 19:23","1 Corinthiens 3:16-17","Proverbes 1:7","Romains 10:17","Jacques 2:26","Matthieu 7:21-24","1 Corinthiens 3:9","1 Pierre 5:8","Matthieu 17:11","Jean 3:4","Matthieu 6:31-33","Luc 8:11","Luc 8:15","Romains 13:10","2 Corinthiens 4:11","Jean 14:23","Proverbes 16:9","Philippiens 4:13","Josué 1:9","Jean 17:3","2 Jean 1:11","Matthieu 19:16-17","Jérémie 2:13","Deutéronome 32:2","Jude 1:6","Hébreux 1:14","Colossiens 1:16","Zacharie 12:1","Exode 3:14","Psaume 84:12","Jean 4:24","Exode 14:12-15","Genèse 3:1","Apocalypse 20:1","Apocalypse 20:2","Apocalypse 12:7-9","Apocalypse 1:20","1 Corinthiens 15:3-4","Actes 26:17","Jean 15:16","2 Corinthiens 4:16","Matthieu 7:21","Matthieu 7:24"];
function afficherVerset() {
const ref = references[Math.floor(Math.random() * references.length)];
document.getElementById("question").innerText ="Trouve le contenu du verset : " + ref;
}
</script>
</body></html>
