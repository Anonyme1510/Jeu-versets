<!DOCTYPE html><html lang="fr"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Jeu de Versets</title><style>

body {
    margin: 0;
    min-height: 100vh;
    font-family: Arial, sans-serif;
    background: linear-gradient(rgba(0,0,0,0.45), rgba(0,0,0,0.45)),
    url("https://medianewsroom.fr/wp-content/uploads/2024/02/croix-christianisme.jpg") center/cover fixed;
    display: flex;
    justify-content: center;
    align-items: center; 
    color: white;
}

.conteneur {
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(10px);
    padding: 40px;
    border-radius: 20px;
    text-align: center;
    max-width: 600px;
}

button {
    background: white;
    color: #333;
    border: none;
    padding: 15px 25px;
    margin: 10px;
    border-radius: 12px;
    font-size: 16px;
    cursor: pointer;
}

button:hover {
    transform: scale(1.05);
}

h1 {
    font-size: 36px;
}

#question, #reponse {
    margin-top: 25px;
    font-size: 24px;
}
</style>
</head>
<body>
<div class="conteneur">
<h1>Jeu de Versets Bibliques</h1>
<div id="menu">
<button onclick="choisirMode('reference')">
📖 Référence → Verset
</button>

<button onclick="choisirMode('verset')">
✏️ Verset → Référence
</button>

<button onclick="choisirMode('aleatoire')">
🎲 Aléatoire
</button>
</div>

<div id="jeu" style="display:none;">

<button id="btnSuivant" onclick="afficherVerset()"></button>

<button id="btnAfficher" onclick="afficherContenu()"></button>
<button onclick="retourMenu()">⬅ Menu</button>
<p id="question"></p>
<p id="reponse"></p>

</div>
<script>

const versets = [
{reference:"Jean 1:1-4", contenu:"Au commencement était la Parole, et la Parole était avec Dieu, et la Parole était Dieu.Elle était au commencement avec Dieu.Toutes choses ont été faites par elle, et rien de ce qui a été fait n'a été fait sans elle.En elle était la vie, et la vie était la lumière des hommes."},
{reference:"Exode 25:8-9", contenu:""},
{reference:"Jean 19:23", contenu:""},
{reference:"1 Corinthiens 3:16-17", contenu:""},
{reference:"Proverbes 1:7", contenu:""},
{reference:"Romains 10:17", contenu:" Ainsi la foi vient de ce qu'on entend, et ce quon entend vient de la parole de Christ."},
{reference:"Jacques 2:26", contenu:""},
{reference:"Matthieu 7:24", contenu:"La pluie est tombée, les torrents sont venus, les vents ont soufflé et se sont jetés contre cette maison : elle n'est point tombée parce qu'elle était fondée sur le roc."},
{reference:"1 Corinthiens 3:9", contenu:" Nous sommes ouvriers avec Dieu, vous êtes le champs de Dieu, l'édifice de Dieu."},
{reference:"1 Pierre 5:8", contenu:" Soyez sobres, veillez. Votre adversaire le diable rôde commeun lyon rugissant, cherchant qu'il dévorera."},
{reference:"Matthieu 17:11", contenu:""},
{reference:"Jean 3:4", contenu:""},
{reference:"Matthieu 6:31-33", contenu:""},
{reference:"Luc 8:11", contenu:""},
{reference:"Luc 8:15", contenu:""},
{reference:"Romains 13:10", contenu:""},
{reference:"2 Corinthiens 4:11", contenu:""},
{reference:"Jean 14:23", contenu:""},
{reference:"Proverbes 16:9", contenu:""},
{reference:"Philippiens 4:13", contenu:""},
{reference:"Josué 1:9", contenu:""},
{reference:"Jean 17:3", contenu:""},
{reference:"2 Jean 1:11", contenu:""},
{reference:"Matthieu 19:16-17", contenu:""},
{reference:"Jérémie 2:13", contenu:""},
{reference:"Deutéronome 32:2", contenu:""},
{reference:"Jude 1:6", contenu:""},
{reference:"Hébreux 1:14", contenu:""},
{reference:"Colossiens 1:16", contenu:""},
{reference:"Zacharie 12:1", contenu:""},
{reference:"Exode 3:14", contenu:""},
{reference:"Psaume 84:12", contenu:""},
{reference:"Jean 4:24", contenu:""},
{reference:"Exode 14:12-15", contenu:""},
{reference:"Genèse 3:1", contenu:""},
{reference:"Apocalypse 20:1", contenu:""},
{reference:"Apocalypse 20:2", contenu:""},
{reference:"Apocalypse 12:7-9", contenu:""},
{reference:"Apocalypse 1:20", contenu:""},
{reference:"1 Corinthiens 15:3-4", contenu:""},
{reference:"Actes 26:17", contenu:""},
{reference:"Jean 15:16", contenu:""},
{reference:"2 Corinthiens 4:16", contenu:""},
{reference:"Matthieu 7:21", contenu:""},
{reference:"Matthieu 7:24", contenu:""}
];

let versetActuel = null;

let mode = "reference";

    modeJeu = mode;

function choisirMode(m){

    mode = m;

    document.getElementById("menu").style.display = "none";
    document.getElementById("jeu").style.display = "block";

    afficherVerset();

}

function afficherVerset() {

    versetActuel = versets[Math.floor(Math.random() * versets.length)];

    document.getElementById("reponse").innerText = "";

    if(mode=="reference"){

        document.getElementById("question").innerText =
        versetActuel.reference;

        document.getElementById("btnAfficher").innerText =
        "Afficher le contenu";

        document.getElementById("btnSuivant").innerText =
        "Verset suivant";

    }

    else if(mode=="verset"){

        document.getElementById("question").innerText =
        versetActuel.contenu;

        document.getElementById("btnAfficher").innerText =
        "Afficher la référence";

        document.getElementById("btnSuivant").innerText =
        "Contenu suivant";

    }

    else{

        if(Math.random()<0.5){

            document.getElementById("question").innerText =
            versetActuel.reference;

            document.getElementById("btnAfficher").innerText =
            "Afficher le contenu";

        }
        else{

            document.getElementById("question").innerText =
            versetActuel.contenu;

            document.getElementById("btnAfficher").innerText =
            "Afficher la référence";

        }

        document.getElementById("btnSuivant").innerText =
        "Suivant";

    }
}
    

function afficherContenu(){

    if(!versetActuel) return;

    if(document.getElementById("btnAfficher").innerText=="Afficher le contenu"){

        document.getElementById("reponse").innerText =
        versetActuel.contenu;

    }
    else{

        document.getElementById("reponse").innerText =
        versetActuel.reference;

    }

}


function retourMenu(){

    document.getElementById("jeu").style.display = "none";
    document.getElementById("menu").style.display = "block";

    document.getElementById("question").innerText = "";
    document.getElementById("reponse").innerText = "";

}

</script>
</div>
</body></html>
