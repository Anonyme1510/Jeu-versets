<!DOCTYPE html><html lang="fr"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Jeu de Versets</title><style>

body {
    
    margin: 0;
    min-height: 100vh;
    font-family: Arial, sans-serif;
    background: linear-gradient(rgba(0,0,0,0.30), rgba(0,0,0,0.30)),
    url("https://medianewsroom.fr/wp-content/uploads/2024/02/croix-christianisme.jpg") center/cover fixed;
    display: flex;
    justify-content: center;
    align-items: center; 
    color: white;
}

.conteneur {
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(10px);
    padding: 40px;
    border-radius: 20px;
    text-align: center;
    max-width: 600px;
}

button {
    background: white;
    color: #333;
    border: none;
    padding: 15px 25px;
    margin: 10px;
    border-radius: 12px;
    font-size: 16px;
    cursor: pointer;
}

button:hover {
    transform: scale(1.05);
}

h1 {
    font-size: 36px;
}

#question, #reponse {
    margin-top: 25px;
    font-size: 24px;
}

#panneauReponse{
    position:fixed;
    top:20px;
    left:20px;
    width:320px;

    background:linear-gradient(135deg,#FFD700,#D4AF37);
    backdrop-filter:blur(10px);

    padding:25px;
    border-radius:20px;

    color:#2c1b00;
    text-align:center;
}

#panneauReponse input{
    width:90%;
    padding:15px;
    font-size:20px;
    border-radius:10px;
    border:none;
    margin-top:15px;
}


#score{
    font-size:30px;
    font-weight:bold;
    margin:20px 0;
}


/* Adaptation téléphone */
    
@media (max-width: 600px){

    #panneauReponse{
        position:fixed;
        top:10px;
        left:50%;
        transform:translateX(-50%);
        width:85%;
        padding:20px;
        z-index:1000;
    }

    .conteneur{
        margin-top:230px;
        width:85%;
        padding:25px;
    }

    h1{
        font-size:28px;
    }

    #question, #reponse{
        font-size:20px;
    }

}
    
    
</style>
</head>
<body>

<div id="panneauReponse" style="display:none;">

    <h2>Réponse</h2>

    <p id="score">0/0</p>

    <input
        type="text"
        id="saisie"
        placeholder="Écris la référence">

</div>

    
<div class="conteneur">

<button onclick="choisirMode('reference')">
📖 Référence → Verset
</button>

<button onclick="choisirMode('verset')">
✏️ Verset → Référence
</button>

<button onclick="choisirMode('aleatoire')">
🎲 Aléatoire
</button>
</div>

<div id="jeu" style="display:none;">

    
<button id="btnSuivant" onclick="afficherVerset()"></button>

<button id="btnAfficher" onclick="afficherContenu()"></button>
<button onclick="retourMenu()">⬅ Menu</button>
<p id="question"></p>
<p id="reponse"></p>

</div>

{reference:"Esaïe 14:12-15", contenu:"Te voilà tombé du ciel, Astre brillant, fils de l'aurore! Tu es abattu à terre, Toi, le vainqueur des nations! Tu disais en ton coeur: Je monterai au ciel, J'élèverai mon trône au-dessus des étoiles de Dieu; Je m'assiérai sur la montagne de l'assemblée, A l'extrémité du septentrion; Je monterai sur le sommet des nues, Je serai semblable au Très Haut.Mais tu as été précipité dans le séjour des morts, Dans les profondeurs de la fosse."},
{reference:"Genèse 3:1", contenu:"Le serpent était le plus rusé de tous les animaux des champs, que l'Éternel Dieu avait faits. Il dit à la femme: Dieu a-t-il réellement dit: Vous ne mangerez pas de tous les arbres du jardin?"},
{reference:"Apocalypse 1:20", contenu:"le mystère des sept étoiles que tu as vues dans ma main droite, et des sept chandeliers d'or. Les sept étoiles sont les anges des sept Églises, et les sept chandeliers sont les sept Églises."},
{reference:"Apocalypse 20:2", contenu:"Il saisit le dragon, le serpent ancien, qui est le diable et Satan, et il le lia pour mille ans."},
{reference:"Apocalypse 12:7-9", contenu:"Et il y eut guerre dans le ciel. Michel et ses anges combattirent contre le dragon. Et le dragon et ses anges combattirent, mais ils ne furent pas les plus forts, et leur place ne fut plus trouvée dans le ciel. Et il fut précipité, le grand dragon, le serpent ancien, appelé le diable et Satan, celui qui séduit toute la terre, il fut précipité sur la terre, et ses anges furent précipités avec lui."},
{reference:"Apocalypse 2:17", contenu:"Que celui qui a des oreilles entende ce que l'Esprit dit aux Églises: A celui qui vaincra je donnerai de la manne cachée, et je lui donnerai un caillou blanc; et sur ce caillou est écrit un nom nouveau, que personne ne connaît, si ce n'est celui qui le reçoit."},
{reference:"1 Corinthiens 15:3-4", contenu:"e vous ai enseigné avant tout, comme je l'avais aussi reçu, que Christ est mort pour nos péchés, selon les Écritures;qu'il a été enseveli, et qu'il est ressuscité le troisième jour, selon les Écritures;"},
{reference:"Actes 26:17", contenu:"Je t'ai choisi du milieu de ce peuple et du milieu des païens, vers qui je t'envoie,"},

{reference:"Matthieu 7:21", contenu:"Ceux qui me disent: Seigneur, Seigneur! n'entreront pas tous dans le royaume des cieux, mais celui-là seul qui fait la volonté de mon Père qui est dans les cieux."},
{reference:"Apocalypse 1:1", contenu:"Révélation de Jésus Christ, que Dieu lui a donnée pour montrer à ses serviteurs les choses qui doivent arriver bientôt, et qu'il a fait connaître, par l'envoi de son ange, à son serviteur Jean,"},
{reference:"Marc 4:13", contenu:"Il leur dit encore: Vous ne comprenez pas cette parabole? Comment donc comprendrez-vous toutes les paraboles?"},
{reference:"Matthieu 3:16", contenu:"ès que Jésus eut été baptisé, il sortit de l'eau. Et voici, les cieux s'ouvrirent, et il vit l'Esprit de Dieu descendre comme une colombe et venir sur lui."},
{reference:"Romains 8:16-18", contenu:"L'Esprit lui-même rend témoignage à notre esprit que nous sommes enfants de Dieu. Or, si nous sommes enfants, nous sommes aussi héritiers: héritiers de Dieu, et cohéritiers de Christ, si toutefois nous souffrons avec lui, afin d'être glorifiés avec lui. J'estime que les souffrances du temps présent ne sauraient être comparées à la gloire à venir qui sera révélée pour nous."},

let versetActuel = null;

let mode = "reference";
let bonnesReponses = 0;
let nombreJoue = 0;

function choisirMode(m){

    mode = m;

    document.getElementById("menu").style.display = "none";
    document.getElementById("jeu").style.display = "block";

    afficherVerset();

}

function afficherVerset() {

    versetActuel = versets[Math.floor(Math.random() * versets.length)];

    document.getElementById("reponse").innerText = "";

    document.getElementById("panneauReponse").style.display = "block";
    document.getElementById("saisie").value = "";

    if(mode=="reference"){

        document.getElementById("question").innerText =
        versetActuel.reference;

        document.getElementById("btnAfficher").innerText =
        "Afficher le contenu";

        document.getElementById("btnSuivant").innerText =
        "Verset suivant";

    }

    else if(mode=="verset"){
        document.getElementById("panneauReponse").style.display = "block";
        document.getElementById("saisie").value = "";

        document.getElementById("question").innerText =
        versetActuel.contenu;

        document.getElementById("btnAfficher").innerText =
        "Afficher la référence";

        document.getElementById("btnSuivant").innerText =
        "Contenu suivant";

    }

    else{
        
        if(Math.random()<0.5){

        document.getElementById("question").innerText =
        versetActuel.reference;

        document.getElementById("btnAfficher").innerText =
        "Afficher le contenu";

        }
        else{

        
        document.getElementById("saisie").value = "";

        document.getElementById("question").innerText =
        versetActuel.contenu;

        document.getElementById("btnAfficher").innerText =
        "Afficher la référence";

        }

    }

        document.getElementById("btnSuivant").innerText =
        "Suivant";

}
    

function afficherContenu(){

    if(!versetActuel) return;

    nombreJoue++;

    let reponse = document.getElementById("saisie").value.trim().toLowerCase();

    let bonne;

    if(mode == "reference"){
        bonne = versetActuel.contenu.trim().toLowerCase();
    }
    else{
        bonne = versetActuel.reference.trim().toLowerCase();
    }

    if(reponse == bonne){
        bonnesReponses++;
    }

    document.getElementById("score").innerText =
    bonnesReponses + "/" + nombreJoue;


    if(mode == "reference"){
        document.getElementById("reponse").innerText =
        versetActuel.contenu;
    }
    else{
        document.getElementById("reponse").innerText =
        versetActuel.reference;
    }

}

function retourMenu(){

    document.getElementById("jeu").style.display = "none";
    document.getElementById("menu").style.display = "block";

    document.getElementById("panneauReponse").style.display="none";

    document.getElementById("question").innerText = "";
    document.getElementById("reponse").innerText = "";

    // Réinitialiser le score
    bonnesReponses = 0;
    nombreJoue = 0;

    document.getElementById("score").innerText = "0/0";

}

</script>
</div>
</body></html>
